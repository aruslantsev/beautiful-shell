name: Build and Publish Ecosystem Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  # 1. Задача для нативной сборки Linux и macOS
  build-unix:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner || 'ubuntu-latest' }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            cmake_flags: ""
          - os: linux
            arch: aarch64
            cmake_flags: "-DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc"
          - os: darwin
            arch: amd64
            runner: macos-latest
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
          - os: darwin
            arch: aarch64
            runner: macos-latest
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=arm64"
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Cross-Compilers (Ubuntu AArch64)
        if: matrix.os == 'linux' && matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }} ../src/beautiful_shell

      - name: Build Project
        run: |
          cd build && cmake --build . --config Release

      - name: Pack Ecosystem Tarball
        run: |
          mkdir -p dist/.beautiful_shell/bin
          mkdir -p dist/.beautiful_shell/scripts
          cp build/beautiful_shell dist/.beautiful_shell/bin/
          cp src/shellrc dist/.beautiful_shell/
          cp src/scripts/* dist/.beautiful_shell/scripts/
          cd dist && tar -czf ../beautiful_shell-${{ matrix.os }}-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-${{ matrix.os }}-${{ matrix.arch }}
          path: beautiful_shell-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  # 2. Новая изолированная задача специально для FreeBSD (amd64 и aarch64)
  build-freebsd:
    name: Build (freebsd-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Используем специальный Github Action, который запускает виртуальную машину FreeBSD внутри Ubuntu хоста
      - name: Build natively inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          # Указываем архитектуру виртуалки (для aarch64 под капотом включится QEMU эмуляция)
          architecture: ${{ matrix.arch }}
          # Пре-устанавливаем необходимые пакеты во FreeBSD
          prepare: |
            pkg install -y cmake git llvm
          # Запускаем сборку внутри FreeBSD среды
          run: |
            mkdir build && cd build
            cmake -DCMAKE_BUILD_TYPE=Release ../src/beautiful_shell
            cmake --build . --config Release
            cd ..
            
            # Упаковываем артефакты
            mkdir -p dist/.beautiful_shell/bin
            mkdir -p dist/.beautiful_shell/scripts
            cp build/beautiful_shell dist/.beautiful_shell/bin/
            cp src/shellrc dist/.beautiful_shell/
            cp src/scripts/* dist/.beautiful_shell/scripts/
            cd dist && tar -czf ../beautiful_shell-freebsd-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload FreeBSD Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-freebsd-${{ matrix.arch }}
          path: dist/beautiful_shell-freebsd-${{ matrix.arch }}.tar.gz

  # 3. Публикация всех собранных архивов в GitHub Releases
  publish-release:
    needs: [build-unix, build-freebsd]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten Artifacts Directory
        run: |
          mkdir -p release-assets
          find all-artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

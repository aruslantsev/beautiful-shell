name: Build and Publish Ecosystem Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build (linux-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm64
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ../src/beautiful_shell

      - name: Build Project
        run: |
          cd build && cmake --build . --config Release

      - name: Pack Ecosystem Tarball
        run: |
          mkdir -p dist/.beautiful_shell/bin
          mkdir -p dist/.beautiful_shell/scripts
          cp build/beautiful_shell dist/.beautiful_shell/bin/
          cp src/shellrc dist/.beautiful_shell/
          cp src/scripts/* dist/.beautiful_shell/scripts/
          cd dist && tar -czf ../beautiful_shell-linux-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload Linux ${{ matrix.arch }} Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-linux-${{ matrix.arch }}
          path: beautiful_shell-linux-${{ matrix.arch }}.tar.gz


  build-macos:
    name: Build (darwin-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
          - arch: aarch64
            runner: macos-15
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ../src/beautiful_shell

      - name: Build Project
        run: |
          cd build && cmake --build . --config Release

      - name: Pack Ecosystem Tarball
        run: |
          mkdir -p dist/.beautiful_shell/bin
          mkdir -p dist/.beautiful_shell/scripts
          cp build/beautiful_shell dist/.beautiful_shell/bin/
          cp src/shellrc dist/.beautiful_shell/
          cp src/scripts/* dist/.beautiful_shell/scripts/
          cd dist && tar -czf ../beautiful_shell-darwin-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-darwin-${{ matrix.arch }}
          path: beautiful_shell-darwin-${{ matrix.arch }}.tar.gz


  build-freebsd:
    name: Build (freebsd-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build natively inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          architecture: ${{ matrix.arch }}
          prepare: |
            pkg install -y cmake git llvm
          run: |
            mkdir build && cd build
            cmake -DCMAKE_BUILD_TYPE=Release ../src/beautiful_shell
            cmake --build . --config Release
            cd ..
            mkdir -p dist/.beautiful_shell/bin
            mkdir -p dist/.beautiful_shell/scripts
            cp build/beautiful_shell dist/.beautiful_shell/bin/
            cp src/shellrc dist/.beautiful_shell/
            cp src/scripts/* dist/.beautiful_shell/scripts/
            cd dist && tar -czf ../beautiful_shell-freebsd-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload FreeBSD Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-freebsd-${{ matrix.arch }}
          path: dist/beautiful_shell-freebsd-${{ matrix.arch }}.tar.gz


  publish-release:
    needs: [build-linux, build-macos, build-freebsd]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten Artifacts Directory
        run: |
          mkdir -p release-assets
          find all-artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

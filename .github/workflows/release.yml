name: Build and Publish Ecosystem Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  # 1. Сборка Linux (Мгновенный старт: amd64 нативно, aarch64 через эмуляцию QEMU)
  build-linux:
    name: Build (linux-${{ matrix.arch }})
    runs-on: ubuntu-latest # Этот раннер всегда выдается GitHub мгновенно, без очередей
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build Linux via QEMU (${{ matrix.arch }})
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.arch }}
          distro: ubuntu22.04
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          run: |
            apt-get update
            apt-get install -y cmake make git build-essential
            mkdir build && cd build
            cmake -DCMAKE_BUILD_TYPE=Release ../src/beautiful_shell
             cmake --build . --config Release

      - name: Pack Ecosystem Tarball
        run: |
          mkdir -p dist/.beautiful_shell/bin
          mkdir -p dist/.beautiful_shell/scripts
          cp build/beautiful_shell dist/.beautiful_shell/bin/
          cp src/shellrc dist/.beautiful_shell/
          cp src/scripts/* dist/.beautiful_shell/scripts/
          cd dist && tar -czf ../beautiful_shell-linux-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload Linux ${{ matrix.arch }} Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-linux-${{ matrix.arch }}
          path: beautiful_shell-linux-${{ matrix.arch }}.tar.gz


  # 2. НАЦИОНАЛЬНАЯ СБОРКА ПОД MACOS (Без очередей на быстрых серверах Apple)
  build-macos:
    name: Build (darwin-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Старый Intel Mac (соберет строго x86_64)
          - arch: amd64
            runner: macos-15-intel
          # Новый Apple Silicon Mac (соберет строго arm64)
          - arch: aarch64
            runner: macos-15
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ../src/beautiful_shell

      - name: Build Project
        run: |
          cd build && cmake --build . --config Release

      - name: Pack Ecosystem Tarball
        run: |
          mkdir -p dist/.beautiful_shell/bin
          mkdir -p dist/.beautiful_shell/scripts
          cp build/beautiful_shell dist/.beautiful_shell/bin/
          cp src/shellrc dist/.beautiful_shell/
          cp src/scripts/* dist/.beautiful_shell/scripts/
          cd dist && tar -czf ../beautiful_shell-darwin-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-darwin-${{ matrix.arch }}
          path: beautiful_shell-darwin-${{ matrix.arch }}.tar.gz


  # 3. Сборка внутри эмулятора FreeBSD (С исправленным ключом arch)
  build-freebsd:
    name: Build (freebsd-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build natively inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          arch: ${{ matrix.arch }}
          prepare: |
            pkg install -y cmake git llvm
          run: |
            mkdir build && cd build
            cmake -DCMAKE_BUILD_TYPE=Release ../src/beautiful_shell
            cmake --build . --config Release
            cd ..
            mkdir -p dist/.beautiful_shell/bin
            mkdir -p dist/.beautiful_shell/scripts
            cp build/beautiful_shell dist/.beautiful_shell/bin/
            cp src/shellrc dist/.beautiful_shell/
            cp src/scripts/* dist/.beautiful_shell/scripts/
            cd dist && tar -czf ../beautiful_shell-freebsd-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload FreeBSD Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-freebsd-${{ matrix.arch }}
          path: dist/beautiful_shell-freebsd-${{ matrix.arch }}.tar.gz


  # 4. Публикация в GitHub Releases
  publish-release:
    needs: [build-linux, build-macos, build-freebsd]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten Artifacts Directory
        run: |
          mkdir -p release-assets
          find all-artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

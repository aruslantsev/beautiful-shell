name: Build and Publish Ecosystem Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build (linux-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Для ARM64 ставим кросс-компиляторы
      - name: Install Cross-Compilers
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Setup CMake Wrapper
        run: |
          mkdir -p bin
          # Находим реальный cmake в системе, где бы он ни лежал
          REAL_CMAKE=$(which cmake)
          echo "System cmake found at: $REAL_CMAKE"
          
          # Записываем скрипт-обертку
          cat << 'EOF' > bin/cmake
          #!/bin/bash
          REAL_SYSTEM_CMAKE临=$(which -a cmake | grep -v "$(pwd)/bin" | head -n 1)
          # Если это сборка под aarch64 И это этап конфигурации (когда передается путь к исходникам или флаги)
          if [ "$MATRIX_ARCH" = "aarch64" ] && { [[ "$*" == *"-DCMAKE_BUILD_TYPE"* ]] || [[ "$*" == *"../"* ]]; }; then
            exec /usr/bin/env cmake-original \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
              "$@"
          else
            # Во всех остальных случаях (для amd64 или при --build) вызываем оригинальный cmake
            exec /usr/bin/env cmake-original "$@"
          fi
          EOF
          
          # Чтобы не запутаться в путях, сделаем алиас на оригинальный cmake
          ln -s "$REAL_CMAKE" bin/cmake-original
          chmod +x bin/cmake
          
          # Добавляем нашу папку bin в начало PATH
          echo "$(pwd)/bin" >> $GITHUB_PATH

      # Сборка: теперь она одинаково простая и изящная для обеих архитектур!
      - name: Configure and Build
        env:
          MATRIX_ARCH: ${{ matrix.arch }} # Передаем архитектуру внутрь bash окружения
        run: |
          mkdir build && cd build
          
          # Вызываем просто cmake. Система сама найдет нашу обертку.
          # Обертка автоматически поймет, нужно ли пробрасывать флаги ARM64
          cmake -DCMAKE_BUILD_TYPE=Release ../src/beautiful_shell
          
          cmake --build .

      - name: Pack Ecosystem Tarball
        run: |
          mkdir -p dist/.beautiful_shell/bin
          mkdir -p dist/.beautiful_shell/scripts
          cp build/beautiful_shell dist/.beautiful_shell/bin/
          cp src/shellrc dist/.beautiful_shell/
          cp src/scripts/* dist/.beautiful_shell/scripts/
          cd dist && tar -czf ../beautiful_shell-linux-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload Linux ${{ matrix.arch }} Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-linux-${{ matrix.arch }}
          path: beautiful_shell-linux-${{ matrix.arch }}.tar.gz


  # 2. НАЦИОНАЛЬНАЯ СБОРКА ПОД MACOS (Без очередей на быстрых серверах Apple)
  build-macos:
    name: Build (darwin-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Старый Intel Mac (соберет строго x86_64)
          - arch: amd64
            runner: macos-15-intel
          # Новый Apple Silicon Mac (соберет строго arm64)
          - arch: aarch64
            runner: macos-15
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ../src/beautiful_shell

      - name: Build Project
        run: |
          cd build && cmake --build . --config Release

      - name: Pack Ecosystem Tarball
        run: |
          mkdir -p dist/.beautiful_shell/bin
          mkdir -p dist/.beautiful_shell/scripts
          cp build/beautiful_shell dist/.beautiful_shell/bin/
          cp src/shellrc dist/.beautiful_shell/
          cp src/scripts/* dist/.beautiful_shell/scripts/
          cd dist && tar -czf ../beautiful_shell-darwin-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-darwin-${{ matrix.arch }}
          path: beautiful_shell-darwin-${{ matrix.arch }}.tar.gz


  # 3. Сборка внутри эмулятора FreeBSD (С исправленным ключом arch)
  build-freebsd:
    name: Build (freebsd-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build natively inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          arch: ${{ matrix.arch }}
          prepare: |
            pkg install -y cmake git llvm
          run: |
            mkdir build && cd build
            cmake -DCMAKE_BUILD_TYPE=Release ../src/beautiful_shell
            cmake --build . --config Release
            cd ..
            mkdir -p dist/.beautiful_shell/bin
            mkdir -p dist/.beautiful_shell/scripts
            cp build/beautiful_shell dist/.beautiful_shell/bin/
            cp src/shellrc dist/.beautiful_shell/
            cp src/scripts/* dist/.beautiful_shell/scripts/
            cd dist && tar -czf ../beautiful_shell-freebsd-${{ matrix.arch }}.tar.gz .beautiful_shell

      - name: Upload FreeBSD Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautiful_shell-freebsd-${{ matrix.arch }}
          path: dist/beautiful_shell-freebsd-${{ matrix.arch }}.tar.gz


  # 4. Публикация в GitHub Releases
  publish-release:
    needs: [build-linux, build-macos, build-freebsd]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten Artifacts Directory
        run: |
          mkdir -p release-assets
          find all-artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
